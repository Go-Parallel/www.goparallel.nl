  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\n  font-weight: 300 700;\n  font-display: swap;\n  src: url(\"ff9c8df8-461e-4901-bfea-f3d8597cb854\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 300 700;\n  font-display: swap;\n  src: url(\"41bb7c9b-4651-41d5-8d02-b32e45f2e328\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n/* ---------- Sacramento — offline fallback for the wordmark ---------- */\n@font-face {\n  font-family: 'Sacramento';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"1c195218-7705-4426-a700-ffab7d79c752\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n@font-face {\n  font-family: 'Sacramento';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"8cd41c22-bba0-4113-a09d-e78539ffd48b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n/* ============================================================\n   PARALLEL — Color tokens\n   Warm through and through — no cool greys, no blue.\n   Bordeaux = strength & ambition · Gold = achievement & premium\n   · Cream = calm & space. Sampled from the logo.\n   ============================================================ */\n:root {\n  /* ---------- BRAND CORE: BORDEAUX (primary) ---------- */\n  --bordeaux:        #A30F13;  /* primary brand red, from the logo ground */\n  --bordeaux-deep:   #6E0F18;  /* darker wine — depth, text on light      */\n  --bordeaux-darker: #4E0A11;  /* near-black wine — backgrounds           */\n  --bordeaux-hover:  #8B0D11;  /* hover / pressed on primary              */\n\n  /* ---------- BRAND CORE: GOLD (secondary) ---------- */\n  --gold:            #FDB13A;  /* secondary, from the logo script         */\n  --gold-deep:       #E0922A;  /* accessible gold for text on cream       */\n  --gold-soft:       #F0D49A;  /* champagne — soft fills, borders         */\n  --gold-wash:       #FAEFD8;  /* faintest gold tint                      */\n\n  /* ---------- NEUTRALS (warm) ---------- */\n  --cream:           #F8F2E8;  /* primary light background                */\n  --cream-deep:      #F1E8D9;  /* slightly deeper section bg              */\n  --paper:           #FCF9F4;  /* card / surface                          */\n  --white:           #FFFFFF;  /* pure accent white                       */\n\n  --ink:             #2A1A1A;  /* primary text — warm near-black          */\n  --ink-2:           #5A4A47;  /* secondary text                          */\n  --ink-3:           #8A7B77;  /* tertiary / captions                     */\n  --line:            #E5D9C8;  /* hairline borders on cream               */\n  --line-soft:       #EFE6D7;  /* faintest divider                        */\n\n  /* ---------- SEMANTIC STATUS ---------- */\n  --success: #2E7D5B;\n  --warning: #E0922A;\n  --danger:  #A30F13;\n\n  /* ---------- SEMANTIC ALIASES ---------- */\n  --fg-1: var(--ink);\n  --fg-2: var(--ink-2);\n  --fg-3: var(--ink-3);\n\n  --bg-page:    var(--cream);\n  --bg-section: var(--cream-deep);\n  --surface-card: var(--paper);\n  --surface-raised: var(--white);\n\n  --border-hairline: var(--line);\n  --border-soft:     var(--line-soft);\n\n  --text-on-accent: var(--white);\n  --text-on-gold:   var(--bordeaux-deep);\n\n  --accent:   var(--bordeaux);\n  --accent-2: var(--gold);\n\n  /* focus ring */\n  --ring: rgba(163, 15, 19, 0.10);\n}\n\n/* ============================================================\n   PARALLEL — Typography tokens\n   Cormorant Garamond (display/headings) · Hanken Grotesk (body/UI)\n   · Allura (logo wordmark + the 'll' mark only). Major-third (1.25) scale.\n   ============================================================ */\n:root {\n  /* ---------- FAMILIES ---------- */\n  --font-script:  'Allura', 'Sacramento', cursive;\n  --font-display: 'Cormorant Garamond', 'Times New Roman', Georgia, serif;\n  --font-sans:    'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n\n  /* ---------- TYPE SCALE (1.25 major third) ---------- */\n  --text-xs:   0.75rem;   /* 12 */\n  --text-sm:   0.875rem;  /* 14 */\n  --text-base: 1rem;      /* 16 */\n  --text-md:   1.125rem;  /* 18 */\n  --text-lg:   1.5rem;    /* 24 */\n  --text-xl:   2rem;      /* 32 */\n  --text-2xl:  2.75rem;   /* 44 */\n  --text-3xl:  3.75rem;   /* 60 */\n  --text-4xl:  5rem;      /* 80 */\n\n  /* ---------- WEIGHTS ---------- */\n  --weight-light:   300;\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semibold:600;\n  --weight-bold:    700;\n\n  /* ---------- LINE HEIGHTS ---------- */\n  --leading-tight: 1.08;\n  --leading-snug:  1.25;\n  --leading-body:  1.6;\n\n  /* ---------- LETTER SPACING ---------- */\n  --tracking-display: -0.01em;\n  --tracking-tight:   -0.005em;\n  --tracking-normal:  0;\n  --tracking-eyebrow: 0.18em;\n}\n\n/* ============================================================\n   SEMANTIC TYPE PRESETS — apply as classes\n   ============================================================ */\n.h-display {\n  font-family: var(--font-display);\n  font-weight: var(--weight-medium);\n  font-size: var(--text-4xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  color: var(--fg-1);\n}\n.h1 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-3xl);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-1);\n}\n.h2 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-2xl);\n  line-height: var(--leading-snug);\n  color: var(--fg-1);\n}\n.h3 {\n  font-family: var(--font-display);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  color: var(--fg-1);\n}\n.eyebrow {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-xs);\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--gold-deep);\n}\n.lead {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-md);\n  line-height: var(--leading-body);\n  color: var(--fg-2);\n}\n.body {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-base);\n  line-height: var(--leading-body);\n  color: var(--fg-1);\n}\n.small {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-regular);\n  font-size: var(--text-sm);\n  line-height: 1.5;\n  color: var(--fg-2);\n}\n.caption {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-medium);\n  font-size: var(--text-xs);\n  line-height: 1.4;\n  color: var(--fg-3);\n}\n.wordmark {\n  font-family: var(--font-script);\n  font-weight: var(--weight-regular);\n  color: var(--gold);\n  line-height: 1;\n}\n/* The signature double-l, picked out in the deeper gold — as in the logo. */\n.wordmark .ll { color: var(--gold-deep); }\n\n/* ----- The 'll' mark: the brand's monogram, drawn from para-LL-el ----- */\n/* The cursive ll from the logo artwork, extracted to transparent PNGs.\n   Renders exactly like the wordmark's script. Default is gold (for dark /\n   bordeaux grounds); add `ll-mark--ink` for the bordeaux-on-light treatment.\n   Sized by font-size. Markup: <span class=\"ll-mark\"><\u002Fspan> */\n.ll-mark {\n  display: inline-block;\n  width: 1em;\n  height: 1em;\n  background: url(\"7801aeba-713a-475d-8863-b29de85936e6\") center / contain no-repeat;\n}\n.ll-mark--ink {\n  background-image: url(\"6652edb8-6b59-4bf3-b173-a26a1fc1658c\");\n}\n/* Tile lockup: the mark centred in a soft bordeaux square. */\n.ll-tile {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  background: var(--bordeaux);\n  color: var(--gold);\n  border-radius: var(--radius-md);\n  overflow: hidden;\n}\n.ll-tile .ll-mark { color: var(--gold); }\n\n/* ============================================================\n   PARALLEL — Spacing, radii, shadows & motion\n   4pt base grid. Warm, soft, low shadows tinted with wine.\n   ============================================================ */\n:root {\n  /* ---------- SPACING (4pt base) ---------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* layout */\n  --container-max: 1080px;\n  --container-pad: 40px;\n  --section-y: 84px;\n\n  /* ---------- RADII ---------- */\n  --radius-sm:   6px;\n  --radius-md:   12px;\n  --radius-lg:   20px;\n  --radius-xl:   28px;\n  --radius-pill: 999px;\n\n  /* ---------- SHADOWS (warm, soft, low — wine-tinted) ---------- */\n  --shadow-xs: 0 1px 2px rgba(78, 10, 17, 0.06);\n  --shadow-sm: 0 2px 8px rgba(78, 10, 17, 0.07);\n  --shadow-md: 0 8px 24px rgba(78, 10, 17, 0.09);\n  --shadow-lg: 0 20px 50px rgba(78, 10, 17, 0.13);\n\n  /* ---------- MOTION ---------- */\n  --ease:      cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --dur-fast:  140ms; /* @kind other */\n  --dur:       240ms; /* @kind other */\n  --dur-slow:  420ms; /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; background: var(--cream); color: var(--ink); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }\n  ::selection { background: var(--gold); color: var(--bordeaux-deep); }\n  a { color: inherit; text-decoration: none; }\n  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 40px; }\n\n  /* topbar */\n  .topbar { position: sticky; top: 0; z-index: 40; background: var(--bordeaux-darker); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(253,177,58,0.18); }\n  .topbar .row { max-width: 1080px; margin: 0 auto; padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }\n  .topbar .nav { display: flex; gap: 26px; }\n  .topbar .nav a { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.72); transition: color var(--dur) var(--ease); }\n  .topbar .nav a:hover { color: var(--gold); }\n  .brandmini { font-family: var(--font-script); font-size: 30px; color: var(--gold); line-height: 1; }\n  .brandmini .ll { color: #FFF1CE; }\n  .brandmini.ink { color: var(--bordeaux); }\n  .brandmini.ink .ll { color: var(--gold-deep); }\n  .lockup { display: inline-flex; align-items: center; gap: 12px; margin-left: 0; }\n  .crest { width: 34px; height: 34px; border-radius: 9px; flex: 0 0 auto; overflow: hidden; }\n  .crest img { width: 100%; height: 100%; object-fit: cover; display: block; }\n  .crest.lg { width: 72px; height: 72px; border-radius: 18px; box-shadow: var(--shadow-md); }\n\n  section { padding: 84px 0; border-bottom: 1px solid var(--line-soft); }\n  .ey { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }\n  .ey span { width: 28px; height: 2px; background: var(--gold); border-radius: 2px; }\n  .ey b { font-weight: 600; font-size: 12.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold-deep); }\n  h2.sec { font-family: var(--font-display); font-weight: 600; font-size: clamp(30px,4vw,46px); line-height: 1.08; margin: 0 0 14px; letter-spacing: -.01em; }\n  p.intro { font-size: 17px; line-height: 1.6; color: var(--i span><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pijler\">\n        <span class=\"ic\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M15.5 8.5l-2 5-5 2 2-5z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span><span class=\"t\">Blik op ná de topsport<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- COVER -->\n<section class=\"cover\" id=\"cover\">\n  <div class=\"wrap\">\n    <div class=\"ey\" style=\"color: rgb(255, 241, 206);\"><span style=\"background:var(--gold)\"><\u002Fspan><b style=\"color: rgb(255, 241, 206);\">Duale carrièrebegeleiding<\u002Fb><\u002Fdiv>\n    <div class=\"mark\" style=\"font-family: Allura;\">Para<span class=\"ll\" style=\"font-family: Allura;\">ll<\u002Fspan>el<\u002Fdiv>\n    <h1 style=\"color: rgb(255, 241, 206);\">Sport <i style=\"color: rgb(255, 241, 206)\">én<\u002Fi> studie, parallel begeleid.<\u002Fh1>\n    <div style=\"margin-top:32px\"><a href=\"ui_kits/website/index.html\" class=\"btn ghost\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18\"><\u002Fpath><path d=\"M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18\"><\u002Fpath><\u002Fsvg> Open Website<\u002Fa><\u002Fdiv>\n    <div class=\"byline\">\n      <span class=\"byline-k\" style=\"font-size: 10px\">DOOR<\u002Fspan>\n      <span class=\"byline-v\" style=\"font-size: 25px; color: rgb(253, 177, 58);\"><span style=\"color: rgb(249, 220, 151);\">Remke Hekers\n\n<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ESSENTIE -->\n<section id=\"essentie\">\n  <div class=\"wrap\" style=\"color: rgb(163, 15, 19);\">\n    <div class=\"ey\"><span><\u002Fspan><b>Merkessentie<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\" style=\"\">Twee sporen, <span style=\"color: rgb(224, 146, 42);\"><em style=\"font-size: 44px; letter-spacing: -0.22px;\"><span data-om-text=\"txt:/https:/91528a77-f1ac-4671-b890-ff7abde03d9b.claudeusercontent.com/v1/design/projects/91528a77-f1ac-4671-b890-ff7abde03d9b/serve/schema.jsx:2039:2042\" class=\"__om-t\" style=\"\">één&nbsp;<\u002Fspan><\u002Fem><\u002Fspan>richting.<\u002Fh2>\n    <p class=\"intro\" style=\"\">Parallel biedt persoonlijke duale carrièrebegeleiding voor (top)sporters die de overstap maken naar het MBO, HBO of WO. Door sport, studie en persoonlijke ontwikkeling samen te brengen, ontstaat meer overzicht en wordt duidelijk welke keuzes nodig zijn om richting te geven aan de toekomst.&nbsp;<\u002Fp>\n    <div class=\"twocol\">\n      <div>\n        <div class=\"tlabel\">Hoe we werken<\u002Fdiv>\n        <p style=\"font-size: 16px; line-height: 1.6; color: var(--ink-2); margin: 0px 0px 18px;\">Onze aanpak is efficiënt en doelgericht: één geïntegreerde jaarplanning voor sport en studie die zorgt voor overzicht. Vanuit die basis wordt zelfsturing gestimuleerd en worden sporters begeleid bij het maken van bewuste keuzes voor de periode ná de topsport.&nbsp;<\u002Fp>\n        <p style=\"font-size: 16px; line-height: 1.6; color: var(--ink-2); margin: 0px;\">\n<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"takeaway\"><p style=\"\">Voor sporters die nú presteren én bouwen aan wie ze daarna willen zijn<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- AANBOD — opener band -->\n<section class=\"band\" id=\"aanbod\">\n  <div class=\"wrap\">\n    <div class=\"plaque\"><img src=\"af2132fa-1d7f-4ef4-a46d-77b686fdffdd\" alt=\"Parallel ll-merkteken\"><\u002Fdiv>\n    <div class=\"ey\"><span style=\"background:var(--gold)\"><\u002Fspan><b>Aanbod · De aanpak<\u002Fb><\u002Fdiv>\n    <p class=\"lead-line\" style=\"\">Sport <i>én<\u002Fi> studie, parallel begeleid.<\u002Fp>\n    <p class=\"sub-line\" style=\"color: rgb(255, 241, 206); width: 600px;\"><span style=\"color: rgb(255, 255, 255);\">Één geïntegreerde jaarplanning die balans en overzicht creëert. Gericht op zelfsturing en bewuste keuzes voor regie op sport, studie <span style=\"color: rgb(253, 177, 58);\">én <\u002Fspan>toekomst.&nbsp;<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEEM -->\n<section id=\"probleem\">\n  <div class=\"wrap\">\n    <div class=\"ey\"><span><\u002Fspan><b>Het vraagstuk<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\" style=\"\">Sport, studie en toekomst als één geheel<\u002Fh2>\n    <p class=\"intro\" style=\"\">De begeleiding van topsportleerlingen vraagt om samenhang tussen school, sportclub en thuis. Parallel brengt deze werelden bij elkaar en versterkt daardoor de begeleiding met:&nbsp;<\u002Fp>\n    <ul class=\"checklist\" style=\"max-width:680px\">\n      <li style=\"\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5L20 6\"><\u002Fpath><\u002Fsvg>Heldere structuur in de combinatie van sport, studie en vrije tijd.<\u002Fli>\n      <li style=\"\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5L20 6\"><\u002Fpath><\u002Fsvg>Een concrete, praktisch toepasbare duale jaarplanning.<\u002Fli>\n      <li><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5L20 6\"><\u002Fpath><\u002Fsvg>Bewuste richting in studie- en loopbaankeuzes.<\u002Fli>\n      <li><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5L20 6\"><\u002Fpath><\u002Fsvg>Ontwikkeling van zelfsturing en eigenaarschap.<\u002Fli>\n    <\u002Ful>\n    <div class=\"takeaway\"><p style=\"\">Combinatie van coaching, planning en strategie gericht op de korte- en de lange termijn<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- METHODE -->\n<section id=\"methode\">\n  <div class=\"wrap\">\n    <div class=\"ey\"><span><\u002Fspan><b>De methode<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\">Drie lagen, één geheel.<\u002Fh2>\n    <p class=\"intro\" style=\"max-width:880px\">Sport, studie en loopbaan komen samen in één doorlopend traject —<br>opgebouwd uit drie lagen die op elkaar voortbouwen, van langetermijnvisie tot dagelijkse regie.<\u002Fp>\n    <div class=\"threecol\">\n      <div class=\"layer\">\n        <div class=\"ln\">Laag 1<\u002Fdiv>\n        <h4>Lange termijn visie<\u002Fh4>\n        <p>Heldere richting voor studie en carrière ná de sport.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"layer\">\n        <div class=\"ln\">Laag 2<\u002Fdiv>\n        <h4>Korte termijn planning<\u002Fh4>\n        <p>Concrete duale jaarplanning, met sport &amp; studie geïntegreerd.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"layer\">\n        <div class=\"ln\">Laag 3<\u002Fdiv>\n        <h4>Zelfsturing &amp; eigenaarschap<\u002Fh4>\n        <p>Vaardigheden om zelf keuzes te maken en regie te nemen.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tlabel\" style=\"margin-top:36px\">Conceptueel model<\u002Fdiv>\n    <div class=\"flow\">\n      <div class=\"node\"><b>Visie<\u002Fb><span>waarheen<\u002Fspan><\u002Fdiv>\n      <svg class=\"arr\" width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12h15\"><\u002Fpath><path d=\"m13 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <div class=\"node\"><b>Planning<\u002Fb><span>hoe<\u002Fspan><\u002Fdiv>\n      <svg class=\"arr\" width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12h15\"><\u002Fpath><path d=\"m13 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <div class=\"node\"><b>Zelfsturing<\u002Fb><span>wie bepaalt<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PAKKETTEN -->\n<section id=\"pakketten\">\n  <div class=\"wrap\">\n    <div class=\"ey\"><span><\u002Fspan><b>Pakketten<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\">Voor elke situatie een passend traject.<\u002Fh2>\n    <p class=\"intro\" style=\"\">Van een intensief 1-op-1 begeleidingstraject tot toegang tot het platform met praktische hulpmiddelen: een duale agenda, inzicht in de balans tussen sport, studie en vrije tijd, en de persoonlijke route overzichtelijk op één plek.&nbsp;&nbsp;<\u002Fp>\n    <div class=\"threecol\">\n      <div class=\"pkg\">\n        <div class=\"tag\">Pakket 1<\u002Fdiv>\n        <h4 style=\"color: rgb(110, 15, 24);\">Individueel begeleidingstraject<\u002Fh4>\n        <div class=\"sub\">Voor de leerling<\u002Fdiv>\n        <ul>\n          <li>12 maanden toegang tot het platform<\u002Fli>\n          <li>Uitgewerkte duale carrièreplanning<\u002Fli>\n          <li>Afstemming met school en sportclub<\u002Fli>\n          <li>1-op-1 begeleidingstraject van 6 gesprekken met de sporter&nbsp;<\u002Fli>\n          <li>Ontwikkelen zelfsturingsvaardigheden<\u002Fli>\n          <li>Creëren van lange termijnvisie op loopbaan ná de sport<\u002Fli>\n        <\u002Ful>\n        <div class=\"sub\">Voor de school<\u002Fdiv>\n        <ul>\n          <li>Intensieve ondersteuning bij complexe casussen<\u002Fli>\n          <li>Versterking van bestaande begeleiding<\u002Fli>\n        <\u002Ful>\n        <div class=\"sub\">Voor de sportclub<\u002Fdiv>\n        <ul>\n          <li>Inzicht in belasting en planning van de sporter<\u002Fli>\n          <li>Betere afstemming tussen sport en studie<\u002Fli>\n          <li>Ondersteuning in lange termijn ontwikkeling van sporters<\u002Fli>\n        <\u002Ful>\n        <div class=\"intens\"><span class=\"chip solid\">Intensiteit · hoog<\u002Fspan><\u002Fdiv>\n        <div class=\"price\"><span class=\"price-label\" style=\"color: rgb(255, 241, 206)\">Tarief<\u002Fspan><span class=\"price-fill\">€ 1250,-<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pkg\">\n        <div class=\"tag\">Pakket 2<\u002Fdiv>\n        <h4 style=\"\"><span style=\"color: rgb(110, 15, 24);\">Start-up traject<\u002Fspan><\u002Fh4>\n        <div class=\"sub\">Voor de leerling<\u002Fdiv>\n        <ul>\n          <li>12 maanden toegang tot het platform<\u002Fli>\n          <li>Uitgewerkte duale carrièreplanning<\u002Fli>\n          <li>Afstemming met school en sportclub<\u002Fli>\n          <li>Twee fysieke afspraken (+/- 90 min) voor afstemming met sporter<\u002Fli>\n        <\u002Ful>\n        <div class=\"sub\">Voor de school<\u002Fdiv>\n        <ul>\n          <li>Direct toepasbaar binnen bestaande begeleiding<\u002Fli>\n          <li>Versterking van bestaande begeleiding<\u002Fli>\n        <\u002Ful>\n        <div class=\"sub\">Voor de sportclub<\u002Fdiv>\n        <ul>\n          <li>Inzicht in belasting en planning van de sporter<\u002Fli>\n          <li>Betere afstemming tussen sport en studie<\u002Fli>\n        <\u002Ful>\n        <div class=\"intens\"><span class=\"chip gold\">Intensiteit · laag–middel<\u002Fspan><\u002Fdiv>\n        <div class=\"price\"><span class=\"price-label\" style=\"color: rgb(255, 241, 206)\">Tarief<\u002Fspan><span class=\"price-fill\">€ 580,-<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pkg\">\n        <div class=\"tag\">Pakket 3<\u002Fdiv>\n        <h4 style=\"color: rgb(110, 15, 24);\">Planningstool<\u002Fh4>\n        <div class=\"sub\">Voor de leerling<\u002Fdiv>\n        <ul>\n          <li>12 maanden toegang tot het platform<\u002Fli>\n        <\u002Ful>\n        <div class=\"sub\">Voor de school<\u002Fdiv>\n        <ul>\n          <li>Direct toepasbaar binnen bestaande begeleiding<\u002Fli>\n          <li>Versterkt structuur en zelfstandigheid<\u002Fli>\n        <\u002Ful>\n        <div class=\"sub\">Voor de sportclub<\u002Fdiv>\n        <ul>\n          <li>Inzicht in planning en belasting van de sporter<\u002Fli>\n          <li>Ondersteunt communicatie met school en sporter<\u002Fli>\n        <\u002Ful>\n        <div class=\"intens\"><span class=\"chip soft\">Intensiteit · laag<\u002Fspan><\u002Fdiv>\n        <div class=\"price\"><span class=\"price-label\" style=\"color: rgb(255, 241, 206)\">Tarief<\u002Fspan><span class=\"price-fill\">€ 8,99 p.m.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RESULTATEN -->\n<section id=\"resultaten\">\n  <div class=\"wrap\">\n    <div class=\"ey\"><span><\u002Fspan><b>Resultaten<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\" style=\"\">Winst voor leerling, school <span style=\"color: rgb(0, 0, 0);\">én <\u002Fspan>sportclub.<\u002Fh2>\n    <p class=\"intro\">Eén aanpak met drievoudige opbrengst: meer regie, rust en overzicht voor de leerling. Voor school en sportclub sterkere begeleiding door beter inzicht en gezamenlijke afstemming.&nbsp;<\u002Fp>\n    <table class=\"restable\">\n      <thead>\n        <tr><th>Voor de leerling<\u002Fth><th>Voor de school<\u002Fth><th>Voor de sportclub<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>Meer rust en overzicht<\u002Ftd><td>Betere planning van lesroosters en toetsmomenten afgestemd op sportverplichtingen<\u002Ftd><td>Overzicht en inzicht van de studiebelasting naast het sportprogramma<\u002Ftd><\u002Ftr>\n        <tr><td>Grip op het sportprogramma en de studiebelasting<\u002Ftd><td>Sterkere afstemming met de sportclub; Duidelijke verwachtingen van de leerling en sportclub<\u002Ftd><td>Betere samenwerking met de onderwijsinstelling voor duurzame sportcarrières<\u002Ftd><\u002Ftr>\n        <tr><td>Lange termijn visie op studie en loopbaan ná de sport<\u002Ftd><td>Verhoogde motivatie en betere studieresultaten door het opstellen van een haalbare planning<\u002Ftd><td>Bijdrage aan de persoonlijke ontwikkeling van sporters, met oog voor hun toekomst buiten de sport<\u002Ftd><\u002Ftr>\n        <tr><td>Eigenaarschap over eigen toekomst<\u002Ftd><td>Minder uitval, verzuim en overbelasting<\u002Ftd><td>Minder druk op trainer/coaches rondom studie-gerelateerde issues<\u002Ftd><\u002Ftr>\n        <tr><td>Ontwikkelen van zelfsturingsvaardigheden<\u002Ftd><td>Professionalisering van de ondersteuning van topsportstudenten<\u002Ftd><td>Versterking van sportbegeleiding met aandacht voor mentale balans<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OVER -->\n<section id=\"over\">\n  <div class=\"wrap\">\n    <div class=\"ey\"><span><\u002Fspan><b>Over Parallel<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\" style=\"\">Eén traject voor sport, studie <span style=\"color: rgb(253, 177, 58);\">én <\u002Fspan>toekomst.<\u002Fh2>\n    <div class=\"twocol\" style=\"grid-template-columns:1fr;max-width:760px\">\n      <div>\n        <p style=\"font-size: 16px; line-height: 1.6; color: var(--ink-2); margin: 0px 0px 18px;\">Parallel is ontstaan vanuit het besef dat een (top)sportcarrière eindig is en dat een goede voorbereiding op de toekomst essentieel is. Vanuit de overtuiging dat een sporter méér is dan alleen zijn of haar prestaties, verdient ook de ontwikkeling buiten de sport aandacht. Tijdens mijn studies en ervaringen binnen de sportwereld zag ik dat onderwijs, sport en thuissituatie vaak los van elkaar functioneren. Juist daar ligt de meerwaarde van Parallel: het verbinden en afstemmen van deze verschillende werelden.<\u002Fp>\n        <p style=\"font-size: 16px; line-height: 1.6; color: var(--ink-2); margin: 0px 0px 18px;\">Parallel brengt de verschillende omgevingen rondom een sporter samen, zodat begeleiding helder en op elkaar afgestemd is. Ik geloof dat sporters zich beter ontwikkelen wanneer iedereen om hen heen dezelfde richting volgt. Door structuur en afstemming te creëren, ontstaat er overzicht en rust – niet alleen voor de sporter, maar voor het hele netwerk daaromheen.<\u002Fp>\n        <p style=\"font-size: 19px; line-height: 1.62; color: var(--bordeaux-deep); font-style: italic; margin: 38px 0px 16px; padding: 6px 0 6px 22px; border-left: 3px solid var(--gold); font-family: &quot;Cormorant Garamond&quot;; font-weight: 500\">\"Haar interesse in duale carrièrebegeleiding is in de afgelopen 10 jaar uitgegroeid tot een duidelijke missie. Vanuit haar academische achtergrond en praktijkervaring binnen het MBO, HBO, WO en de sport brengt zij alles samen in haar eigen onderneming: <span style=\"color: rgb(110, 15, 24);\">Para<span style=\"color: rgb(253, 177, 58);\">ll<\u002Fspan>el<\u002Fspan>.\"<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VERVOLGSTAP -->\n<section class=\"band\" id=\"vervolgstap\">\n  <div class=\"wrap\">\n    <div class=\"ey\"><span style=\"background:var(--gold)\"><\u002Fspan><b>Vervolgstap<\u002Fb><\u002Fdiv>\n    <h2 class=\"sec\" style=\"font-family: &quot;Cormorant Garamond&quot;\">Benieuwd wat <img src=\"c7e33234-f621-40b3-b183-5321c2c4aa02\" alt=\"Parallel\" style=\"height:1.5em;width:auto;vertical-align:baseline;position:relative;top:0.22em\"> voor jullie organisatie&nbsp;én (top)sportleerlingen kan betekenen?<\u002Fh2>\n    <p class=\"intro\">In een vrijblijvend kennismakingsgesprek kijken we hoe deze aanpak aansluit op jullie huidige begeleiding.<\u002Fp>\n    <ul class=\"checklist\" style=\"max-width:560px\">\n      <li><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--gold)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5L20 6\"><\u002Fpath><\u002Fsvg><span style=\"color:#fff\">Plan een kennismakingsgesprek.<\u002Fspan><\u002Fli>\n      <li><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--gold)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m4 12 5 5L20 6\"><\u002Fpath><\u002Fsvg><span style=\"color:#fff\">Bespreek hoe dit aansluit op jullie huidige begeleiding.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n    <div style=\"margin-top:32px\"><a href=\"ui_kits/website/index.html\" class=\"btn ghost\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.4 8.6 12 4 2.6 8.6 12 13z\"><\u002Fpath><path d=\"M6 10.5V16c0 1.4 2.7 2.8 6 2.8s6-1.4 6-2.8v-5.5\"><\u002Fpath><\u002Fsvg> Plan een kennismaking<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BOTTOM RIBBON -->\n<div class=\"ribbon bottom\">\n  <div class=\"wrap\">\n    <div class=\"signoff\">\n      <span class=\"signoff-group\">\n        <span class=\"mk\">para<span class=\"ll\">ll<\u002Fspan>el<\u002Fspan>\n        <span class=\"rule\"><\u002Fspan>\n        <span class=\"tg\">Sport <b>én<\u002Fb> studie, parallel begeleid.<\u002Fspan>\n      <\u002Fspan>\n      <span class=\"signoff-meta\">© 2026 Parallel — Remke Hekers · Duale carrièrebegeleiding<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
